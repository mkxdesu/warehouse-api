services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - .:/var/www
    depends_on:
      - mysql
      - redis
    networks:
      - warehouse-net

  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - warehouse-net

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: warehouse
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - warehouse-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - warehouse-net

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: php artisan queue:work redis --sleep=3 --tries=3
    volumes:
      - .:/var/www
    depends_on:
      - redis
      - mysql
    networks:
      - warehouse-net

networks:
  warehouse-net:
    driver: bridge

volumes:
  mysql-data: